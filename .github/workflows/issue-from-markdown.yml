name: Create GitHub Issues from Markdown Specs

on:
  workflow_call:

jobs:
  create-issues-from-markdown:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find all unlinked issue specs
        id: find-specs
        run: |
          # Scan ALL .github/issues/*.md files (not just changed ones)
          # The <!-- GitHub Issue: #N --> marker provides idempotency
          ALL_FILES=$(find .github/issues -maxdepth 1 -name '*.md' ! -name 'README.md' 2>/dev/null | sort || true)

          if [ -z "$ALL_FILES" ]; then
            echo "No issue spec files found"
            echo "files=" >> $GITHUB_OUTPUT
          else
            echo "Found issue spec files:"
            echo "$ALL_FILES"
            FILES_JSON=$(echo "$ALL_FILES" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "files=$FILES_JSON" >> $GITHUB_OUTPUT
          fi

      - name: Process issue files
        if: steps.find-specs.outputs.files != '' && steps.find-specs.outputs.files != '[]'
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const allFiles = ${{ steps.find-specs.outputs.files }};

            if (!allFiles || allFiles.length === 0) {
              console.log('No files to process');
              return;
            }

            console.log(`Scanning ${allFiles.length} issue spec file(s)`);
            let created = 0;
            let skipped = 0;

            for (const filePath of allFiles) {
              try {
                const content = fs.readFileSync(filePath, 'utf8');

                // Skip if already linked to an issue
                const issueNumberMatch = content.match(/<!-- GitHub Issue: #(\d+) -->/);
                if (issueNumberMatch) {
                  console.log(`⏭️  ${filePath} → already #${issueNumberMatch[1]}`);
                  skipped++;
                  continue;
                }

                // Skip if marked completed-without-issue
                if (content.includes('<!-- Completed without GitHub Issue')) {
                  console.log(`⏭️  ${filePath} → completed without issue`);
                  skipped++;
                  continue;
                }

                // Skip if status is complete/done/closed
                const statusMatch = content.match(/\*\*Status:\*\*\s*([\w-]+)/i);
                const status = statusMatch ? statusMatch[1].toLowerCase() : '';
                const completedStatuses = ['complete', 'completed', 'done', 'closed', 'resolved'];
                if (completedStatuses.includes(status)) {
                  console.log(`✅ ${filePath} → status "${statusMatch[1]}", marking as complete`);
                  const skipMarker = `<!-- Completed without GitHub Issue — status was "${statusMatch[1]}" at merge time -->\n\n`;
                  fs.writeFileSync(filePath, skipMarker + content, 'utf8');
                  skipped++;
                  continue;
                }

                console.log(`\n📄 Processing: ${filePath}`);

                // Extract title from first H1, strip leading number prefix (e.g. "044: ")
                const titleMatch = content.match(/^#\s+(.+)$/m);
                const rawTitle = titleMatch ? titleMatch[1].trim() : `Issue from ${filePath.split('/').pop()}`;
                const title = rawTitle.replace(/^\d+:\s*/, '');

                // Double-check: search GitHub for existing issue with same title (prevents race conditions)
                const searchResult = await github.rest.search.issuesAndPullRequests({
                  q: `repo:${context.repo.owner}/${context.repo.repo} is:issue in:title "${title.replace(/"/g, '\\"')}"`,
                  per_page: 5
                });
                const titleMatch2 = searchResult.data.items.find(i => i.title === title);
                if (titleMatch2) {
                  console.log(`⏭️  ${filePath} → issue "${title}" already exists as #${titleMatch2.number} (title match)`);
                  const issueLink = `<!-- GitHub Issue: #${titleMatch2.number} - ${titleMatch2.html_url} -->\n\n`;
                  if (!content.includes(`#${titleMatch2.number}`)) {
                    fs.writeFileSync(filePath, issueLink + content, 'utf8');
                  }
                  skipped++;
                  continue;
                }

                // Determine labels
                const labels = [];
                if (filePath.includes('bug-') || title.toLowerCase().includes('bug:')) {
                  labels.push('bug');
                } else if (filePath.includes('feature-') || title.toLowerCase().includes('feature:')) {
                  labels.push('enhancement');
                } else if (title.toLowerCase().includes('architecture')) {
                  labels.push('architecture', 'enhancement');
                } else {
                  labels.push('enhancement');
                }
                if (content.toLowerCase().includes('security') || content.toLowerCase().includes('vulnerability')) {
                  labels.push('security');
                }
                if (content.toLowerCase().includes('performance') || content.toLowerCase().includes('optimization')) {
                  labels.push('performance');
                }

                const issueBody = `<!-- Auto-generated from ${filePath} -->\n\n${content}\n\n---\n\n*This issue was automatically created from [\`${filePath}\`](${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/blob/main/${filePath}).*`;

                console.log(`📝 Creating issue: "${title}" [${labels.join(', ')}]`);

                const issue = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: title,
                  body: issueBody,
                  labels: labels
                });

                console.log(`✅ Created issue #${issue.data.number}: ${issue.data.html_url}`);
                created++;

                // Update markdown with issue link
                const issueLink = `<!-- GitHub Issue: #${issue.data.number} - ${issue.data.html_url} -->\n\n`;
                fs.writeFileSync(filePath, issueLink + content, 'utf8');

                // Try to trigger stakeholder review if the workflow exists
                try {
                  await github.rest.actions.createWorkflowDispatch({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    workflow_id: 'issue-stakeholder-review.yml',
                    ref: 'main',
                    inputs: { issue_number: String(issue.data.number) }
                  });
                  console.log(`🎭 Stakeholder review triggered`);
                } catch (e) {
                  console.log(`ℹ️  No stakeholder review workflow (optional)`);
                }

              } catch (error) {
                console.error(`❌ Error processing ${filePath}:`, error.message);
              }
            }

            console.log(`\n✅ Done: ${created} created, ${skipped} skipped`);

      - name: Commit updated markdown files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add .github/issues/
            git commit -m "docs: Link markdown specs to GitHub issues [skip ci]"
            git push
            echo "✅ Committed and pushed updated markdown files"
          fi
